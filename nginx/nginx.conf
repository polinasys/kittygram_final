upstream backend {
    server backend:9090;
}

server {
  listen 80;
  index index.html;

  location /static/ {
    alias /staticfiles/static/;
  }

  location /media/ {
    alias /media/;
  }

  location /api/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend/api/;
  }

  location /admin/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend/admin/;
  }

  location / {
    alias /staticfiles/;
    try_files $uri $uri/ /index.html;
  }
}
