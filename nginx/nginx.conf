server_tokens off;  # Скрываем версию nginx

upstream backend {
    server backend:9090;
}

server {
    listen 80;
    index index.html;
    client_max_body_size 10M;  # Для загрузки больших картинок

    location /static/ {
        alias /staticfiles/;
    }

    location /media/ {
        alias /media/;
    }

    location /api/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://backend/api/;
    }

    location /admin/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://backend/admin/;
    }

    location / {
        proxy_set_header Host $http_host;  
        alias /staticfiles/;
        try_files $uri $uri/ /index.html;
    }
}