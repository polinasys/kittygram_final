name: Kittygram CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}

jobs:
  test_backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install ruff
        pip install -r requirements.txt
    
    - name: Lint with ruff
      run: |
        cd backend
        ruff check .
    
    - name: Run backend tests
      run: |
        cd backend
        python manage.py test

  test_frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Run frontend tests
      run: |
        cd frontend
        npm test -- --passWithNoTests

  build_and_push:
    needs: [test_backend, test_frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest
    
    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest
    
    - name: Build and push gateway
      uses: docker/build-push-action@v4
      with:
        context: ./nginx
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest
    
    - name: Send Telegram notification on success
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ✅ Успешный деплой Kittygram!
          
          🐱 Проект: Kittygram
          📦 Образы обновлены на Docker Hub:
          - ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest
          - ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest
          - ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest
          
          🌿 Ветка: main
          🕒 Время: ${{ github.event.head_commit.timestamp }}
          🔗 Коммит: ${{ github.event.head_commit.url }}
          👤 Автор: ${{ github.actor }}
          
          Статус: ✅ Все тесты пройдены, образы успешно загружены!

  send_failure_notification:
    needs: [test_backend, test_frontend, build_and_push]
    runs-on: ubuntu-latest
    if: always() && failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Send Telegram notification on failure
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ❌ Ошибка в процессе деплоя Kittygram!
          
          🐱 Проект: Kittygram
          🌿 Ветка: main
          🕒 Время: $(date '+%Y-%m-%d %H:%M:%S')
          👤 Автор: ${{ github.actor }}
          
          Провалившиеся джобы:
          - ${{ join(job.status, ', ') }}
          
          Ссылка на workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          Статус: ❌ Требуется внимание!